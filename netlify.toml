[build]
publish = "public"
command = "hugo --gc --minify"

[context.production.environment]
HUGO_VERSION = "0.162.1"
HUGO_ENV = "production"
HUGO_ENABLEGITINFO = "true"

[context.split1]
command = "hugo --gc --minify --enableGitInfo"

[context.split1.environment]
HUGO_VERSION = "0.162.1"
HUGO_ENV = "production"

[context.deploy-preview]
command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.deploy-preview.environment]
HUGO_VERSION = "0.162.1"

[context.branch-deploy]
command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[context.branch-deploy.environment]
HUGO_VERSION = "0.162.1"

[context.next.environment]
HUGO_ENABLEGITINFO = "true"

[[plugins]]
package = "netlify-plugin-image-optim"

[[redirects]]
from = "/updates/*"
to = "/blog/:splat"
status = 301
force = true

# linktree's link shortener + QRCode generator lost my link... so now we need a redirect
[[redirects]]
from = "/tying-knot/"
to = "/tying-the-masterpoint-knot/"
status = 301
force = true

# case study slug shortened for consistency (power-digital-case-study -> power-digital)
[[redirects]]
from = "/case-studies/power-digital-case-study/"
to = "/case-studies/power-digital/"
status = 301
force = true

# old top-level landing page for the case study, removed July 2026
[[redirects]]
from = "/power-digital-case-study/"
to = "/case-studies/power-digital/"
status = 301
force = true

[[redirects]]
from = "/*"
to = "/404.html"
status = 404

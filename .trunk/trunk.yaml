version: 0.1
cli:
  version: 1.22.15
plugins:
  sources:
    - id: trunk
      ref: v1.10.1
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - actionlint@1.7.7
    - renovate@40.0.6
    - checkov@3.2.427
    - trufflehog@3.88.31
    - git-diff-check
    - gitleaks@8.26.0
    - markdownlint@0.45.0
    - oxipng@9.1.5
    - prettier@3.5.3
    - svgo@3.3.2
    - taplo@0.9.3
    - yamllint@1.37.1
    - zizmor@1.25.2
  definitions:
    - name: zizmor
      environment:
        # Optional token here so that it's not needed locally, but can be used
        # when trunk is called from our lint workflow in GHA
        - name: ZIZMOR_GITHUB_TOKEN
          value: ${env.GITHUB_TOKEN}
          optional: true
      commands:
        # Set to pedantic so that zizmor will run its stale-action-refs audit rule
        - name: lint
          run: zizmor --format=sarif --persona=pedantic ${target}
  ignore:
    - linters: [ALL]
      paths:
        - "**/PULL_REQUEST_TEMPLATE.md"
        - assets/js/plugins.js
        - assets/css/cookieconsent.min.scss
        - assets/css/custom.scss
    # These don't like the way we insert shortcode components (e.g. {{< cs-about >}} )
    - linters: [markdownlint, prettier]
      paths:
        - content/case-studies/**/*.md
runtimes:
  enabled:
    - go@1.21.0
    - node@18.20.5
    - python@3.10.8
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available

{{- $url := .Permalink -}}
{{- $external := false -}}
{{- with .Params.outbound }}{{ $url = . }}{{ $external = true }}{{ end -}}
<div class="col col-12 cs-card-col">
    <a class="cs-card" href="{{ $url }}"{{ if $external }} target="_blank" rel="noopener"{{ end }} aria-label="{{ .Title | safeHTML }}">
        <div class="cs-card__media">
            {{ with .Param "preview_image" }}
            <img src="{{ . }}" class="lazy" alt="{{ $.Title | safeHTML }}" loading="lazy">
            {{ end }}
        </div>
        <div class="cs-card__body">
            <h3 class="cs-card__title">{{ .Title | safeHTML }}</h3>
            <p class="cs-card__desc">{{ .Description }}</p>
            <span class="cs-card__cta">{{ if $external }}Read the story{{ else }}Read the story{{ end }} <span class="cs-card__arrow" aria-hidden="true">&rarr;</span></span>
        </div>
    </a>
</div>

{{- $title := .Get "title" -}}
{{- $variant := .Get "variant" | default "neutral" -}}
<div class="cs-pane cs-pane--{{ $variant }}">
  {{- if $title -}}
  <div class="cs-pane__pill">{{ $variant | upper }}</div>
  <h4 class="cs-pane__title">{{ $title | safeHTML }}</h4>
  {{- end -}}
  <div class="cs-pane__body">
    {{ .Inner | $.Page.RenderString }}
  </div>
</div>

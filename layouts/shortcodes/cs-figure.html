{{- $src := .Get "src" -}}
{{- $alt := .Get "alt" -}}
{{- $caption := .Get "caption" -}}
{{- $variant := .Get "variant" | default "default" -}}
{{- $wide := .Get "wide" -}}
<figure class="cs-figure cs-figure--{{ $variant }}{{ if $wide }} cs-figure--wide{{ end }}">
  <div class="cs-figure__frame">
    <img src="{{ $src }}" alt="{{ $alt }}" loading="lazy" />
  </div>
  {{- if $caption -}}
  <figcaption class="cs-figure__caption">{{ $caption | safeHTML }}</figcaption>
  {{- end -}}
</figure>

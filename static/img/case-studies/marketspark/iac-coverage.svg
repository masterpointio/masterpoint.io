<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Infrastructure as Code coverage went from 0% to approximately 100%">
  <defs>
    <linearGradient id="iacGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ede497" />
      <stop offset="50%" stop-color="#2ad9c2" />
      <stop offset="100%" stop-color="#d891ce" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#13474a"/>
      <stop offset="100%" stop-color="#0a2b2d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="14" fill="#0e383a"/>

  <text x="60" y="50" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="14" letter-spacing="3" font-weight="700" fill="#ede497">INFRASTRUCTURE AS CODE COVERAGE</text>
  <line x1="60" y1="65" x2="200" y2="65" stroke="url(#iacGrad)" stroke-width="3"/>

  <!-- Before -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="13" letter-spacing="2" font-weight="800" fill="#d891ce">BEFORE</text>
    <text x="0" y="80" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="84" font-weight="900" fill="#ffffff">0%</text>
    <text x="0" y="125" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="15" fill="#a8b8b9">of AWS infrastructure managed as code.</text>
    <text x="0" y="148" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="15" fill="#a8b8b9">Every change clicked by hand.</text>
  </g>

  <!-- bar chart visualization in middle -->
  <g transform="translate(380,130)">
    <!-- Track -->
    <rect x="0" y="0" width="460" height="22" rx="11" fill="#0a2326" stroke="#1f5a5d"/>
    <!-- empty marker -->
    <line x1="0" y1="-12" x2="0" y2="34" stroke="#d891ce" stroke-width="2"/>
    <text x="-4" y="-18" text-anchor="end" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#d891ce">0%</text>
    <!-- fill -->
    <rect x="0" y="0" width="455" height="22" rx="11" fill="url(#iacGrad)"/>
    <!-- end marker -->
    <line x1="455" y1="-12" x2="455" y2="34" stroke="#2ad9c2" stroke-width="2"/>
    <text x="459" y="-18" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#2ad9c2">~100%</text>

    <!-- Resource type labels under -->
    <g font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" fill="#a8b8b9" text-anchor="middle">
      <text x="0"   y="62">VPCs</text>
      <text x="65"  y="62">Aurora</text>
      <text x="130" y="62">ECS</text>
      <text x="195" y="62">Lambda</text>
      <text x="260" y="62">API GW</text>
      <text x="325" y="62">SQS/SNS</text>
      <text x="390" y="62">S3 · CF</text>
      <text x="455" y="62">WAF · IAM</text>
    </g>
    <g>
      <circle cx="0"   cy="48" r="3" fill="#ede497"/>
      <circle cx="65"  cy="48" r="3" fill="#ede497"/>
      <circle cx="130" cy="48" r="3" fill="#2ad9c2"/>
      <circle cx="195" cy="48" r="3" fill="#2ad9c2"/>
      <circle cx="260" cy="48" r="3" fill="#2ad9c2"/>
      <circle cx="325" cy="48" r="3" fill="#d891ce"/>
      <circle cx="390" cy="48" r="3" fill="#d891ce"/>
      <circle cx="455" cy="48" r="3" fill="#d891ce"/>
    </g>
  </g>

  <!-- After -->
  <g transform="translate(900,100)">
    <text x="0" y="0" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="13" letter-spacing="2" font-weight="800" fill="#2ad9c2">AFTER</text>
    <text x="0" y="80" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="84" font-weight="900" fill="url(#iacGrad)">~100%</text>
    <text x="0" y="125" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="15" fill="#a8b8b9">defined in OpenTofu.</text>
    <text x="0" y="148" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="15" fill="#a8b8b9">Every change is a reviewed PR.</text>
  </g>

  <!-- Bottom strip -->
  <g transform="translate(60,300)" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="13" fill="#a4f2e6">
    <circle cx="6" cy="-4" r="4" fill="#ede497"/>
    <text x="20" y="0">Spacelift-orchestrated</text>
    <circle cx="206" cy="-4" r="4" fill="#2ad9c2"/>
    <text x="220" y="0">PR-driven change interface</text>
    <circle cx="446" cy="-4" r="4" fill="#d891ce"/>
    <text x="460" y="0">Self-documenting, audit-ready</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-label="Pull-request driven infrastructure-as-code workflow: developers open a PR, Spacelift plans, a reviewer approves, then Spacelift applies">
  <defs>
    <linearGradient id="brandGradF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ede497" />
      <stop offset="50%" stop-color="#2ad9c2" />
      <stop offset="100%" stop-color="#d891ce" />
    </linearGradient>
    <marker id="arrowF" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2ad9c2"/>
    </marker>
  </defs>
  <rect width="1200" height="380" rx="14" fill="#0e383a"/>

  <text x="60" y="50" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="14" letter-spacing="3" font-weight="700" fill="#ede497">CHANGE INTERFACE · A PULL REQUEST</text>
  <line x1="60" y1="65" x2="200" y2="65" stroke="url(#brandGradF)" stroke-width="3"/>
  <text x="60" y="92" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="14" fill="#a8b8b9">PRs are the change interface. Spacelift runs are the audit trail.</text>

  <!-- nodes -->
  <g transform="translate(60,150)">
    <!-- node 1: engineer -->
    <g>
      <rect width="200" height="120" rx="12" fill="#0a2b2d" stroke="url(#brandGradF)" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" font-weight="700" fill="#a4f2e6">ENGINEER</text>
      <text x="100" y="68" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#fff">open PR</text>
      <text x="100" y="92" text-anchor="middle" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#ede497">infra/aws · main</text>
    </g>
    <path d="M210,210 L 250,210" stroke="#2ad9c2" stroke-width="2" marker-end="url(#arrowF)"/>

    <!-- node 2 -->
    <g transform="translate(250,0)">
      <rect width="200" height="120" rx="12" fill="#0a2b2d" stroke="url(#brandGradF)" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" font-weight="700" fill="#a4f2e6">SPACELIFT</text>
      <text x="100" y="68" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#fff">tofu plan</text>
      <text x="100" y="92" text-anchor="middle" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#ede497">posts diff on PR</text>
    </g>
    <path d="M460,210 L 500,210" stroke="#2ad9c2" stroke-width="2" marker-end="url(#arrowF)"/>

    <!-- node 3 -->
    <g transform="translate(500,0)">
      <rect width="200" height="120" rx="12" fill="#0a2b2d" stroke="url(#brandGradF)" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" font-weight="700" fill="#a4f2e6">REVIEWER</text>
      <text x="100" y="68" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#fff">approves</text>
      <text x="100" y="92" text-anchor="middle" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#ede497">policy gate</text>
    </g>
    <path d="M710,210 L 750,210" stroke="#2ad9c2" stroke-width="2" marker-end="url(#arrowF)"/>

    <!-- node 4 -->
    <g transform="translate(750,0)">
      <rect width="200" height="120" rx="12" fill="#0a2b2d" stroke="url(#brandGradF)" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" font-weight="700" fill="#a4f2e6">SPACELIFT</text>
      <text x="100" y="68" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#fff">tofu apply</text>
      <text x="100" y="92" text-anchor="middle" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="11" fill="#ede497">OIDC to AWS</text>
    </g>
    <path d="M960,210 L 1000,210" stroke="#2ad9c2" stroke-width="2" marker-end="url(#arrowF)"/>

    <!-- node 5 -->
    <g transform="translate(1000,0)">
      <rect width="140" height="120" rx="12" fill="url(#brandGradF)"/>
      <text x="70" y="34" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" font-weight="700" fill="#0e383a">AWS</text>
      <text x="70" y="70" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0e383a">reality</text>
      <text x="70" y="94" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" fill="#0e383a">matches code</text>
    </g>
  </g>

  <!-- tagline -->
  <g transform="translate(60,330)" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="13" fill="#a4f2e6">
    <circle cx="6" cy="-4" r="4" fill="#ede497"/>
    <text x="20" y="0">No static credentials in CI/CD</text>
    <circle cx="246" cy="-4" r="4" fill="#2ad9c2"/>
    <text x="260" y="0">Policy-driven approval flows</text>
    <circle cx="486" cy="-4" r="4" fill="#d891ce"/>
    <text x="500" y="0">Every run is an audit-trail entry</text>
  </g>
</svg>

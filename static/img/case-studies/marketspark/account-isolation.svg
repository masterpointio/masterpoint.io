<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Before and after: AWS account isolation — from one monolithic account to eleven environment- and function-isolated accounts">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ede497" />
      <stop offset="50%" stop-color="#2ad9c2" />
      <stop offset="100%" stop-color="#d891ce" />
    </linearGradient>
    <linearGradient id="pineCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#13474a" />
      <stop offset="100%" stop-color="#0a2b2d" />
    </linearGradient>
    <linearGradient id="dangerCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a1a1c" />
      <stop offset="100%" stop-color="#2a1416" />
    </linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#7f3a3f" stroke-width="2" opacity="0.5"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="#0e383a" rx="14"/>

  <!-- Title strip -->
  <text x="60" y="55" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="14" letter-spacing="3" font-weight="700" fill="#ede497">FROM ONE ACCOUNT, TO ELEVEN</text>
  <line x1="60" y1="70" x2="200" y2="70" stroke="url(#brandGrad)" stroke-width="3"/>

  <!-- BEFORE block -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="13" letter-spacing="2" font-weight="800" fill="#d891ce">BEFORE</text>
    <text x="0" y="24" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">1 AWS Account</text>
    <text x="0" y="46" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="13" fill="#a8b8b9">Shared VPC. Shared IAM. Shared blast radius.</text>

    <!-- monolithic account block -->
    <g transform="translate(0,70)" filter="url(#softShadow)">
      <rect width="480" height="340" rx="14" fill="url(#dangerCard)" stroke="#d891ce" stroke-width="2"/>
      <rect width="480" height="340" rx="14" fill="url(#hatch)" opacity="0.18"/>
      <text x="240" y="34" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="12" letter-spacing="3" font-weight="700" fill="#f0c0c0">MONOLITH</text>

      <!-- chaotic env tags overlapping -->
      <g font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-weight="700" font-size="14">
        <rect x="40"  y="70"  width="100" height="36" rx="6" fill="#d891ce" opacity="0.85"/>
        <text x="90"  y="93" text-anchor="middle" fill="#1a0c1e">PROD</text>

        <rect x="160" y="60"  width="120" height="36" rx="6" fill="#ede497" opacity="0.9"/>
        <text x="220" y="83" text-anchor="middle" fill="#3a3300">STAGING</text>

        <rect x="300" y="80"  width="120" height="36" rx="6" fill="#2ad9c2" opacity="0.85"/>
        <text x="360" y="103" text-anchor="middle" fill="#003a36">DEVELOPMENT</text>

        <rect x="70"  y="120" width="160" height="32" rx="5" fill="#0e383a" stroke="#d891ce" stroke-width="1.5"/>
        <text x="150" y="141" text-anchor="middle" fill="#fff" font-size="12">shared VPC</text>

        <rect x="250" y="120" width="160" height="32" rx="5" fill="#0e383a" stroke="#d891ce" stroke-width="1.5"/>
        <text x="330" y="141" text-anchor="middle" fill="#fff" font-size="12">shared IAM</text>

        <rect x="100" y="160" width="280" height="32" rx="5" fill="#0e383a" stroke="#d891ce" stroke-width="1.5"/>
        <text x="240" y="181" text-anchor="middle" fill="#fff" font-size="12">long-lived IAM users · static keys</text>

        <rect x="60"  y="200" width="170" height="32" rx="5" fill="#0e383a" stroke="#d891ce" stroke-width="1.5"/>
        <text x="145" y="221" text-anchor="middle" fill="#fff" font-size="12">ClickOps console</text>

        <rect x="250" y="200" width="170" height="32" rx="5" fill="#0e383a" stroke="#d891ce" stroke-width="1.5"/>
        <text x="335" y="221" text-anchor="middle" fill="#fff" font-size="12">manual EC2 OpenVPN</text>

        <rect x="120" y="240" width="240" height="32" rx="5" fill="#0e383a" stroke="#d891ce" stroke-width="1.5"/>
        <text x="240" y="261" text-anchor="middle" fill="#fff" font-size="12">no central observability</text>
      </g>

      <text x="240" y="310" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="13" fill="#f0c0c0" font-style="italic">"source of truth = whatever someone clicked last"</text>
    </g>
  </g>

  <!-- arrow -->
  <g transform="translate(580,260)">
    <path d="M0 30 L60 30 L60 18 L90 38 L60 58 L60 46 L0 46 Z" fill="url(#brandGrad)"/>
    <text x="45" y="0" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" font-weight="700" fill="#ede497">MIGRATION</text>
  </g>

  <!-- AFTER block -->
  <g transform="translate(700,100)">
    <text x="0" y="0" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="13" letter-spacing="2" font-weight="800" fill="#2ad9c2">AFTER</text>
    <text x="0" y="24" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">11 AWS Accounts</text>
    <text x="0" y="46" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="13" fill="#a8b8b9">Hard IAM boundary. Separate billing. SOC2-aligned.</text>

    <g transform="translate(0,70)" filter="url(#softShadow)">
      <rect width="440" height="340" rx="14" fill="url(#pineCard)" stroke="#2ad9c2" stroke-width="2"/>
      <text x="220" y="34" text-anchor="middle" font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="12" letter-spacing="3" font-weight="700" fill="#a4f2e6">AWS ORGANIZATION</text>

      <!-- 11 account tiles in a 4-cols grid -->
      <g font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-weight="700" font-size="11" text-anchor="middle">
        <!-- row 1 (foundation) -->
        <rect x="20"  y="62"  width="96" height="44" rx="6" fill="#0e383a" stroke="url(#brandGrad)" stroke-width="2"/>
        <text x="68"  y="80"  fill="#ede497">ROOT</text>
        <text x="68"  y="96"  fill="#7f9d9e" font-size="9">org · scp</text>

        <rect x="124" y="62"  width="96" height="44" rx="6" fill="#0e383a" stroke="url(#brandGrad)" stroke-width="2"/>
        <text x="172" y="80"  fill="#ede497">IDENTITY</text>
        <text x="172" y="96"  fill="#7f9d9e" font-size="9">SSO · Entra ID</text>

        <rect x="228" y="62"  width="96" height="44" rx="6" fill="#0e383a" stroke="url(#brandGrad)" stroke-width="2"/>
        <text x="276" y="80"  fill="#ede497">LOG ARCHIVE</text>
        <text x="276" y="96"  fill="#7f9d9e" font-size="9">audit logs</text>

        <rect x="332" y="62"  width="96" height="44" rx="6" fill="#0e383a" stroke="url(#brandGrad)" stroke-width="2"/>
        <text x="380" y="80"  fill="#ede497">AUDIT</text>
        <text x="380" y="96"  fill="#7f9d9e" font-size="9">security hub</text>

        <!-- row 2 (shared services) -->
        <rect x="20"  y="118" width="96" height="44" rx="6" fill="#0e383a" stroke="#2ad9c2"/>
        <text x="68"  y="136" fill="#a4f2e6">DNS</text>
        <text x="68"  y="152" fill="#7f9d9e" font-size="9">route53</text>

        <rect x="124" y="118" width="96" height="44" rx="6" fill="#0e383a" stroke="#2ad9c2"/>
        <text x="172" y="136" fill="#a4f2e6">ARTIFACTS</text>
        <text x="172" y="152" fill="#7f9d9e" font-size="9">ECR · S3</text>

        <rect x="228" y="118" width="96" height="44" rx="6" fill="#0e383a" stroke="#2ad9c2"/>
        <text x="276" y="136" fill="#a4f2e6">AUTOMATION</text>
        <text x="276" y="152" fill="#7f9d9e" font-size="9">spacelift · CI</text>

        <rect x="332" y="118" width="96" height="44" rx="6" fill="#0e383a" stroke="#2ad9c2"/>
        <text x="380" y="136" fill="#a4f2e6">SANDBOX</text>
        <text x="380" y="152" fill="#7f9d9e" font-size="9">experiments</text>

        <!-- row 3 (workloads) -->
        <rect x="72"  y="200" width="96" height="44" rx="6" fill="#0e383a" stroke="#d891ce"/>
        <text x="120" y="218" fill="#f7d4ef">DEV</text>
        <text x="120" y="234" fill="#7f9d9e" font-size="9">isolated VPC</text>

        <rect x="176" y="200" width="96" height="44" rx="6" fill="#0e383a" stroke="#d891ce"/>
        <text x="224" y="218" fill="#f7d4ef">STAGING</text>
        <text x="224" y="234" fill="#7f9d9e" font-size="9">isolated VPC</text>

        <rect x="280" y="200" width="96" height="44" rx="6" fill="#0e383a" stroke="#d891ce"/>
        <text x="328" y="218" fill="#f7d4ef">PROD</text>
        <text x="328" y="234" fill="#7f9d9e" font-size="9">isolated VPC</text>
      </g>

      <!-- bottom callout -->
      <line x1="20" y1="265" x2="420" y2="265" stroke="#1f5a5d" stroke-dasharray="3,3"/>
      <g font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" fill="#a4f2e6">
        <circle cx="32" cy="288" r="3" fill="#2ad9c2"/>
        <text x="44" y="292">SCP guardrails at Org level</text>
        <circle cx="32" cy="308" r="3" fill="#ede497"/>
        <text x="44" y="312">OIDC trust · zero static credentials</text>
      </g>
      <g font-family="Proxima Nova, Helvetica, Arial, sans-serif" font-size="11" fill="#a4f2e6">
        <circle cx="232" cy="288" r="3" fill="#d891ce"/>
        <text x="244" y="292">Per-env IAM · cost · blast radius</text>
        <circle cx="232" cy="308" r="3" fill="#2ad9c2"/>
        <text x="244" y="312">SEC01-BP01 aligned (Well-Architected)</text>
      </g>
    </g>
  </g>
</svg>

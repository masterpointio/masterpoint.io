<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" fill="none" role="img" aria-label="Synthmind AI reference architecture on AWS managed by Terraform and Spacelift.">
  <defs>
    <linearGradient id="arch-grad" x1="0" y1="0" x2="900" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ede497"/>
      <stop offset=".5" stop-color="#2ad9c2"/>
      <stop offset="1" stop-color="#d891ce"/>
    </linearGradient>
    <linearGradient id="arch-bg" x1="0" y1="0" x2="0" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e383a"/>
      <stop offset="1" stop-color="#031e1f"/>
    </linearGradient>
    <filter id="arch-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope=".35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- bg -->
  <rect width="900" height="440" rx="16" fill="url(#arch-bg)"/>

  <!-- title -->
  <text x="30" y="40" font-family="'proxima-nova', Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="3" fill="#2ad9c2">TARGET ARCHITECTURE</text>
  <text x="30" y="72" font-family="'proxima-nova', Arial, sans-serif" font-size="26" font-weight="800" fill="#fff">AWS platform, governed by Terraform + Spacelift</text>

  <!-- Column: Developers -->
  <g transform="translate(30 120)">
    <rect width="190" height="260" rx="12" fill="rgba(42,217,194,0.06)" stroke="rgba(42,217,194,0.3)"/>
    <text x="16" y="28" font-family="'proxima-nova',Arial" font-size="12" font-weight="800" letter-spacing="2" fill="#2ad9c2">DEVELOPERS</text>
    <g transform="translate(16 48)" font-family="'proxima-nova',Arial" font-size="13" fill="#fff" font-weight="700">
      <rect width="158" height="44" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="14" y="27">GitHub + PRs</text>
      <rect y="56" width="158" height="44" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="14" y="83">AI pair w/ Cursor</text>
      <rect y="112" width="158" height="44" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="14" y="139">Self-service UI</text>
      <rect y="168" width="158" height="44" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="14" y="195">CLI: `mp plan`</text>
    </g>
  </g>

  <!-- Column: Control plane -->
  <g transform="translate(270 120)">
    <rect width="220" height="260" rx="12" fill="rgba(237,228,151,0.05)" stroke="rgba(237,228,151,0.3)"/>
    <text x="16" y="28" font-family="'proxima-nova',Arial" font-size="12" font-weight="800" letter-spacing="2" fill="#ede497">CONTROL PLANE</text>
    <g transform="translate(16 48)" font-family="'proxima-nova',Arial" font-size="13" fill="#fff" font-weight="700">
      <rect width="188" height="44" rx="8" fill="rgba(255,255,255,0.06)" stroke="url(#arch-grad)"/>
      <text x="14" y="27">Spacelift stacks</text>
      <rect y="56" width="188" height="44" rx="8" fill="rgba(255,255,255,0.06)" stroke="url(#arch-grad)"/>
      <text x="14" y="83">OpenTofu modules</text>
      <rect y="112" width="188" height="44" rx="8" fill="rgba(255,255,255,0.06)" stroke="url(#arch-grad)"/>
      <text x="14" y="139">OPA policies</text>
      <rect y="168" width="188" height="44" rx="8" fill="rgba(255,255,255,0.06)" stroke="url(#arch-grad)"/>
      <text x="14" y="195">Drift detection</text>
    </g>
  </g>

  <!-- Column: AWS workloads -->
  <g transform="translate(540 120)">
    <rect width="330" height="260" rx="12" fill="rgba(216,145,206,0.06)" stroke="rgba(216,145,206,0.3)"/>
    <text x="16" y="28" font-family="'proxima-nova',Arial" font-size="12" font-weight="800" letter-spacing="2" fill="#d891ce">AWS WORKLOADS (multi-account)</text>
    <g font-family="'proxima-nova',Arial" font-size="12" fill="#fff" font-weight="700">
      <!-- row 1 -->
      <g transform="translate(16 48)">
        <rect width="92" height="68" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
        <text x="46" y="30" text-anchor="middle" font-size="18">EKS</text>
        <text x="46" y="50" text-anchor="middle" font-size="10" fill="#2ad9c2">inference</text>
      </g>
      <g transform="translate(120 48)">
        <rect width="92" height="68" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
        <text x="46" y="30" text-anchor="middle" font-size="18">SageMaker</text>
        <text x="46" y="50" text-anchor="middle" font-size="10" fill="#2ad9c2">training</text>
      </g>
      <g transform="translate(224 48)">
        <rect width="92" height="68" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
        <text x="46" y="30" text-anchor="middle" font-size="18">Bedrock</text>
        <text x="46" y="50" text-anchor="middle" font-size="10" fill="#2ad9c2">foundation</text>
      </g>
      <!-- row 2 -->
      <g transform="translate(16 128)">
        <rect width="92" height="68" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
        <text x="46" y="30" text-anchor="middle" font-size="16">RDS</text>
        <text x="46" y="50" text-anchor="middle" font-size="10" fill="#d891ce">Aurora</text>
      </g>
      <g transform="translate(120 128)">
        <rect width="92" height="68" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
        <text x="46" y="30" text-anchor="middle" font-size="16">S3 + KMS</text>
        <text x="46" y="50" text-anchor="middle" font-size="10" fill="#d891ce">feature store</text>
      </g>
      <g transform="translate(224 128)">
        <rect width="92" height="68" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
        <text x="46" y="30" text-anchor="middle" font-size="16">OpenSearch</text>
        <text x="46" y="50" text-anchor="middle" font-size="10" fill="#d891ce">vector</text>
      </g>
    </g>
    <g transform="translate(16 212)">
      <rect width="298" height="36" rx="8" fill="rgba(42,217,194,0.1)" stroke="rgba(42,217,194,0.4)"/>
      <text x="149" y="23" text-anchor="middle" font-family="'proxima-nova',Arial" font-size="12" font-weight="800" fill="#2ad9c2" letter-spacing="1.5">AWS ORGANIZATIONS · 7 ACCOUNTS · SOC 2</text>
    </g>
  </g>

  <!-- arrows -->
  <g stroke="url(#arch-grad)" stroke-width="2" fill="none">
    <path d="M220 240 L270 240" marker-end="url(#arrow)"/>
    <path d="M490 240 L540 240" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2ad9c2"/>
    </marker>
  </defs>

  <!-- footer -->
  <text x="30" y="420" font-family="'proxima-nova',Arial" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">MASTERPOINT — SYNTHMIND AI CASE STUDY — ILLUSTRATIVE ARCHITECTURE</text>
</svg>
